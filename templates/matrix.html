<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VAGALUME90 — A Matrix (Substrato)</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=JetBrains+Mono:wght@300;400;700&family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
<style>
:root {
  --void: #07070A; --gold: #F5C030; --plasma: #E8407A; --matrix: #4FA3FF;
  --glass-bg: rgba(79,163,255,0.03); --glass-border: rgba(79,163,255,0.15);
  --font-title: 'Bebas Neue', sans-serif; --font-mono: 'JetBrains Mono', monospace;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--void); color: #FFF; font-family: 'Outfit', sans-serif; min-height: 100vh; padding-bottom: 100px; }
.matrix-grid { position: fixed; inset: 0; background: linear-gradient(rgba(79,163,255,0.01) 1px, transparent 1px), linear-gradient(90deg, rgba(79,163,255,0.01) 1px, transparent 1px); background-size: 30px 30px; pointer-events: none; z-index: 0; }
header { padding: 30px 20px; text-align: center; border-bottom: 1px solid rgba(79,163,255,0.1); position: relative; z-index: 1; }
header h1 { font-family: var(--font-title); font-size: 3rem; letter-spacing: 6px; color: var(--matrix); }
header p { font-family: var(--font-mono); font-size: 0.75rem; color: rgba(255,255,255,0.4); letter-spacing: 4px; }
.main-container { max-width: 800px; margin: 30px auto; padding: 0 20px; position: relative; z-index: 1; }
.welcome-box { background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: 16px; padding: 25px; backdrop-filter: blur(18px); margin-bottom: 25px; }
.welcome-title { font-family: var(--font-title); font-size: 1.8rem; color: var(--gold); }
.status-badge { display: inline-block; font-family: var(--font-mono); font-size: 0.65rem; background: rgba(79,163,255,0.1); border: 1px solid var(--matrix); color: var(--matrix); padding: 4px 10px; border-radius: 4px; margin-top: 5px; }

.ai-console { background: rgba(7,7,10,0.75); border: 1px solid var(--glass-border); border-radius: 16px; padding: 25px; box-shadow: 0 0 30px rgba(79,163,255,0.05); }
.ai-title { font-family: var(--font-title); font-size: 1.4rem; color: var(--matrix); margin-bottom: 15px; display: flex; align-items: center; gap: 10px; }
.ai-response-box { background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.05); border-radius: 8px; padding: 15px; min-height: 120px; max-height: 250px; overflow-y: auto; font-family: var(--font-mono); font-size: 0.85rem; color: rgba(255,255,255,0.85); margin-bottom: 15px; line-height: 1.6; }
.ai-input-group { display: flex; gap: 10px; }
.ai-input { flex: 1; background: rgba(245,192,48,0.02); border: 1px solid var(--glass-border); border-radius: 8px; padding: 12px; font-family: var(--font-mono); color: var(--matrix); outline: none; font-size: 0.9rem; }
.ai-btn { background: var(--matrix); border: none; color: var(--void); font-family: var(--font-title); font-size: 1.1rem; padding: 0 20px; border-radius: 8px; cursor: pointer; letter-spacing: 1px; }

nav { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: rgba(7,7,10,0.92); border: 1px solid rgba(245,192,48,0.2); padding: 12px 28px; border-radius: 30px; display: flex; gap: 24px; z-index: 100; }
nav a { color: rgba(255,255,255,0.5); text-decoration: none; font-family: var(--font-mono); font-size: 0.8rem; letter-spacing: 2px; text-transform: uppercase; }
nav a.active { color: var(--gold); }
</style>
</head>
<body>
<div class="matrix-grid"></div>
<header>
  <h1>A MATRIX</h1>
  <p>// SUBSTRATO CENTRAL DA INTELIGÊNCIA</p>
</header>
<div class="main-container">
  <div class="welcome-box">
    <div class="welcome-title">NEXO NEURAL CONECTADO</div>
    <div class="status-badge">Operador: {{ session.get('username', 'Desconhecido') }} [{{ rank }}]</div>
  </div>

  <div class="ai-console">
    <div class="ai-title">🧠 Oráculo Gemini VG90</div>
    <div class="ai-response-box" id="ai-response">
      // Aguardando diretrizes do operador... Insira o seu comando abaixo para extrair inteligência artificial da rede.
    </div>
    <div class="ai-input-group">
      <input type="text" id="ai-prompt" class="ai-input" placeholder="Ex: Gere um script de vendas de 30 segundos...">
      <button class="ai-btn" id="ai-send-btn">PROCESSAR</button>
    </div>
  </div>
</div>
<nav>
  <a href="/mundo/matrix" class="active">Matrix</a>
  <a href="/mundo/mercado">Mercado</a>
  <a href="/mundo/ruas">Ruas</a>
</nav>

<script>
document.getElementById('ai-send-btn').addEventListener('click', async () => {
  const promptInput = document.getElementById('ai-prompt');
  const responseBox = document.getElementById('ai-response');
  const prompt = promptInput.value.trim();
  if (!prompt) return;
  
  responseBox.innerHTML = "◌ Canalizando frequências neurais... Processando dados do ecossistema...";
  promptInput.value = "";
  
  try {
    const res = await fetch('/api/ai/matrix', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ prompt: prompt })
    });
    const data = await res.json();
    responseBox.innerHTML = data.response;
  } catch (err) {
    responseBox.innerHTML = "✗ Erro na conexão quântica com a IA. Tente novamente.";
  }
});
</script>
</body>
</html>
