<!DOCTYPE html>
<html lang="pt-AO">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VG90 · Portal</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
<style>
:root {
  --void: #0a0a0c; --gold: #F5C030; --rose: #E8407A; --blue: #4FA3FF;
  --f-m: 'JetBrains Mono', monospace; --f-b: 'Outfit', sans-serif;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 100%; height: 100vh; background: var(--void);
  font-family: var(--f-b); color: #fff; overflow: hidden;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
}

/* Fundo Dinâmico */
#ambient-orb {
  position: fixed; width: 400px; height: 400px; border-radius: 50%;
  filter: blur(100px); pointer-events: none; opacity: 0.15; transition: background 0.5s;
}

/* Contentor do Logotipo */
#eye-container {
  width: 180px; height: 180px; margin-bottom: 20px;
  cursor: pointer; position: relative; z-index: 10;
  transition: transform 0.3s ease;
}
#eye-container:hover { transform: scale(1.05); }

.logo-img {
  width: 100%; height: 100%; object-fit: contain; border-radius: 50%;
  display: block;
}

/* Fallback se a imagem não carregar */
.logo-fallback {
  width: 100%; height: 100%; border-radius: 50%;
  border: 2px solid var(--blue); background: rgba(79, 163, 255, 0.1);
  box-shadow: 0 0 20px var(--blue); display: flex; align-items: center; justify-content: center;
}
.logo-fallback::after {
  content: '👁️'; font-size: 3.5rem;
}

/* Cartão Uniforme de Acesso */
#auth-card {
  background: rgba(15, 15, 20, 0.98); border: 1px solid rgba(255,255,255,0.08);
  padding: 30px; border-radius: 12px; width: 100%; max-width: 360px;
  box-shadow: 0 10px 40px rgba(0,0,0,0.5); z-index: 10; transition: border-color 0.5s;
}

.form-title { font-size: 1.1rem; font-weight: 600; margin-bottom: 20px; text-align: center; letter-spacing: 0.5px; }
.auth-form { display: none; }
.auth-form.active { display: block; }

/* Inputs Modernos e Limpos */
.input-field {
  width: 100%; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.12);
  padding: 12px 15px; font-size: 0.9rem; color: #fff; border-radius: 6px;
  outline: none; margin-bottom: 15px; transition: all 0.3s; font-family: var(--f-b);
}
.input-field:focus { border-color: var(--blue); background: rgba(255,255,255,0.06); }

/* Botões Diretos */
.btn-submit {
  width: 100%; border: none; padding: 13px; border-radius: 6px;
  font-size: 1rem; font-weight: 600; color: #000; cursor: pointer;
  transition: all 0.3s; margin-top: 5px;
}
.btn-submit:hover { transform: translateY(-1px); filter: brightness(1.1); }

/* Links de Troca Alternativa */
.switch-text { display: block; text-align: center; margin-top: 15px; font-size: 0.8rem; color: #888; text-decoration: none; }
.switch-text strong { color: #fff; }
.switch-text:hover strong { text-decoration: underline; }

/* Linha de Status Inferior */
#status-readout { margin-top: 20px; font-family: var(--f-m); font-size: 0.7rem; color: #666; text-align: center; max-width: 320px; }
</style>
</head>
<body>

<div id="ambient-orb"></div>

<div id="eye-container">
  <img src="logo_olho.jpg.png" alt="Logo VG90" class="logo-img" id="site-logo" onerror="tryFlaskPath()">
</div>

<div id="auth-card">
  <div id="form-login" class="auth-form">
    <div class="form-title" style="color: var(--rose);">Entrar no Ecossistema</div>
    <form onsubmit="sendAuth(event, '/login')">
      <input type="text" name="username" class="input-field" placeholder="Nome de Utilizador" required autocomplete="username">
      <input type="password" name="password" class="input-field" placeholder="Sua Chave / Senha" required autocomplete="current-password">
      <button type="submit" class="btn-submit" style="background: var(--rose); color: #fff;">Entrar Agora</button>
    </form>
    <a href="#" class="switch-text" onclick="changeMode('register')">Não tem uma conta? <strong>Inscrever-se</strong></a>
  </div>

  <div id="form-register" class="auth-form">
    <div class="form-title" style="color: var(--gold);">Criar Novo Operador</div>
    <form onsubmit="sendAuth(event, '/register')">
      <input type="text" name="username" class="input-field" placeholder="Escolha um Nome de Utilizador" required autocomplete="username">
      <input type="email" name="email" class="input-field" placeholder="Seu E-mail" required autocomplete="email">
      <input type="password" name="password" class="input-field" placeholder="Crie uma Senha Segura" required autocomplete="new-password">
      <button type="submit" class="btn-submit" style="background: var(--gold);">Solicitar Acesso</button>
    </form>
    <a href="#" class="switch-text" onclick="changeMode('login')">Já tem registo? <strong>Fazer Login</strong></a>
  </div>
</div>

<div id="status-readout" id="msg-box">A aguardar comandos...</div>

<script>
// Tenta caminhos alternativos se o logo inicial direto falhar
function tryFlaskPath() {
  const img = document.getElementById('site-logo');
  if (img && !img.dataset.attempted) {
    img.dataset.attempted = "true";
    // Tenta procurar na pasta static caso esteja lá guardado
    img.src = "/static/logo_olho.jpg.png";
  } else {
    // Se falhar tudo, ativa o design em CSS puro para nunca ficar sem nada
    const container = document.getElementById('eye-container');
    container.innerHTML = '<div class="logo-fallback"></div>';
  }
}

let currentMode = localStorage.getItem('returning_vg90') === 'true' ? 'login' : 'register';

function changeMode(mode) {
  currentMode = mode;
  localStorage.setItem('returning_vg90', mode === 'login' ? 'true' : 'false');
  
  const loginForm = document.getElementById('form-login');
  const registerForm = document.getElementById('form-register');
  const card = document.getElementById('auth-card');
  const orb = document.getElementById('ambient-orb');
  
  if (mode === 'login') {
    loginForm.classList.add('active');
    registerForm.classList.remove('active');
    card.style.borderColor = 'rgba(232, 64, 122, 0.3)';
    orb.style.background = 'var(--rose)';
  } else {
    registerForm.classList.add('active');
    loginForm.classList.remove('active');
    card.style.borderColor = 'rgba(245, 192, 48, 0.3)';
    orb.style.background = 'var(--gold)';
  }
}

// Inicializa o ecrã no modo correto
changeMode(currentMode);

// Envio simplificado de dados para o Backend Python
function sendAuth(event, url) {
  event.preventDefault();
  const readout = document.getElementById('status-readout');
  readout.textContent = "A processar sinal...";
  readout.style.color = "#888";

  const formData = new FormData(event.target);

  fetch(url, { method: 'POST', body: formData })
  .then(res => res.json())
  .then(data => {
    if (data.success) {
      if (url === '/register') {
        readout.textContent = "Registo Concluído com Sucesso! A entrar...";
        readout.style.color = "var(--gold)";
        setTimeout(() => changeMode('login'), 1500);
      } else {
        readout.textContent = `Bem-vindo, ${data.username}! A entrar nas Ruas...`;
        readout.style.color = "var(--blue)";
        setTimeout(() => window.location.href = "/mundo/ruas", 1200);
      }
    } else {
      readout.textContent = data.message;
      readout.style.color = "#ff4444";
    }
  })
  .catch(() => {
    readout.textContent = "Erro de ligação com o servidor central.";
    readout.style.color = "#ff4444";
  });
}
</script>
</body>
</html>
