<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VG90 · Portal de Entrada Supremo</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=JetBrains+Mono:wght@400;700&family=Outfit:wght@300;400&display=swap" rel="stylesheet">
<style>
:root{
  --void:#060608; --gold:#F5C030; --rose:#E8407A; --blue:#4FA3FF;
  --f-h:'Bebas Neue',sans-serif; --f-m:'JetBrains Mono',monospace; --f-b:'Outfit',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;background:var(--void);overflow:hidden;font-family:var(--f-b);color:#fff;}

/* ── ATMOSFERA E SCANLINES ── */
#breath-canvas{position:fixed;inset:0;z-index:0;opacity:0.35;}
body::before{
  content:'';position:fixed;inset:0;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.15) 2px,rgba(0,0,0,.15) 4px);
  pointer-events:none;z-index:900;
}

.amb{position:fixed;border-radius:50%;filter:blur(120px);pointer-events:none;z-index:1;}
.amb-center{width:500px;height:500px;top:50%;left:50%;transform:translate(-50%,-50%);transition:background 0.8s;}

/* ── STAGE CENTRAL ── */
#gatekeeper-stage{
  position:fixed;inset:0;z-index:10;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
}

/* ── MALHA DE REDE SVG ── */
#network-svg { position:absolute; inset:0; width:100%; height:100%; pointer-events:none; z-index:2; }

/* ── O NÚCLEO (OLHO CONSCIENTE) ── */
#eye-container {
  position: relative; width: 270px; height: 270px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; z-index: 20;
  transition: transform 0.6s cubic-bezier(0.19, 1, 0.22, 1);
}

.dna-ring{position:absolute;border-radius:50%;border-style:solid;border-width:1px;pointer-events:none;transition:border-color 0.8s;}
.dr1{inset:-15px;animation:drSpin 30s linear infinite;}
.dr2{inset:5px;border-style:dashed;animation:drSpin 20s linear infinite reverse;}
.dr3{inset:25px;border-style:dotted;animation:drSpin 12s linear infinite;}
@keyframes drSpin{from{transform:rotate(0)}to{transform:rotate(360deg)}}

/* Estilo do Olho (Imagem) */
.neural-eye-img {
  width: 78%; height: 78%; object-fit: contain; border-radius: 50%;
  animation: eyeBreath 4s ease-in-out infinite; transition: all 0.5s;
}
@keyframes eyeBreath {
  0%, 100% { transform: scale(1); opacity: 0.9; }
  50% { transform: scale(1.04); opacity: 1; }
}

/* Olho de Fallback em CSS Puro (Ativado se a imagem falhar) */
.css-eye-fallback {
  width: 120px; height: 120px; border-radius: 50%;
  border: 2px solid var(--rose); background: rgba(232, 64, 122, 0.1);
  box-shadow: 0 0 30px var(--rose); display: flex; align-items: center; justify-content: center;
  animation: eyeBreath 4s ease-in-out infinite;
}
.css-eye-fallback::after {
  content: ''; width: 40px; height: 40px; border-radius: 50%; background: #fff;
  box-shadow: 0 0 15px #fff;
}

/* ── PAINEL DE SINAL TERMINAL ── */
#login-card {
  position: absolute; background: rgba(6, 6, 8, 0.97); border: 1px solid transparent;
  box-shadow: 0 0 50px rgba(0, 0, 0, 0.9); padding: 35px 30px; border-radius: 6px;
  width: 350px; text-align: center; backdrop-filter: blur(16px); z-index: 30;
  opacity: 0; pointer-events: none; transform: scale(0.92) translateY(30px);
  transition: all 0.5s cubic-bezier(0.19, 1, 0.22, 1);
}
#login-card.active { opacity: 1; pointer-events: all; transform: scale(1) translateY(0); }

.terminal-header { font-family: var(--f-m); font-size: 0.6rem; letter-spacing: 2px; margin-bottom: 25px; transition: color 0.8s; }
.auth-form { display: none; }
.auth-form.visible { display: block; }

.input-group { position: relative; margin-bottom: 16px; }
.input-group input {
  width: 100%; background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.1);
  padding: 11px 14px; font-family: var(--f-m); font-size: 0.75rem; color: #fff;
  border-radius: 4px; outline: none; transition: all 0.3s;
}
.input-group input:focus { background: rgba(255,255,255,0.04); border-color: inherit; }

.btn-connect {
  width: 100%; border: none; padding: 12px; border-radius: 4px;
  font-family: var(--f-h); font-size: 1.2rem; letter-spacing: 2px; color: #fff;
  cursor: pointer; margin-top: 10px; transition: all 0.3s;
}
.btn-connect:hover { transform: translateY(-1px); filter: brightness(1.15); }

.switch-auth-mode { display: block; margin-top: 16px; font-family: var(--f-m); font-size: 0.6rem; text-decoration: none; letter-spacing: 1px; transition: color 0.3s; }
.switch-auth-mode:hover { text-decoration: underline; }
.btn-close-terminal { display: block; margin-top: 20px; font-family: var(--f-m); font-size: 0.55rem; color: rgba(255,255,255,0.3); text-decoration: none; letter-spacing: 1px; }
.btn-close-terminal:hover { color: #fff; }

#pulse-instruction { font-family: var(--f-m); font-size: 0.55rem; letter-spacing: 4px; margin-top: 30px; animation: textBlink 2s infinite; transition: all 0.5s; }
@keyframes textBlink { 0%, 100% { opacity: 0.25; } 50% { opacity: 1; } }
#readout { position: fixed; bottom: 16px; font-family: var(--f-m); font-size: 0.55rem; letter-spacing: 3px; text-align: center; z-index: 100; transition: color 0.8s; }
</style>
</head>
<body>

<div class="amb amb-center" id="ambient-orb"></div>
<canvas id="breath-canvas"></canvas>

<div id="gatekeeper-stage">
  <svg id="network-svg"></svg>

  <div id="eye-container" onclick="openTerminal()">
    <div class="dna-ring dr1"></div>
    <div class="dna-ring dr2"></div>
    <div class="dna-ring dr3"></div>
    
    <img src="olho.png" alt="Olho Consciente VG90" class="neural-eye-img" id="core-eye" onerror="switchToCssEye()">
  </div>

  <div id="pulse-instruction">INICIALIZAR CONEXÃO NEURAL</div>

  <div id="login-card">
    <div id="form-login" class="auth-form">
      <div class="terminal-header" style="color:var(--rose);">// ENTRAR_NO_ECOSSISTEMA (MATRIX/MERCADO/RUAS)</div>
      <form onsubmit="handleFormSubmit(event, 'login')">
        <div class="input-group"><input type="text" placeholder="IDENTIFICADOR" required autocomplete="off"></div>
        <div class="input-group"><input type="password" placeholder="CHAVE NEURAL" required></div>
        <button type="submit" class="btn-connect" style="background:linear-gradient(135deg, var(--rose), #9d174d);">CONECTAR AO NÚCLEO</button>
      </form>
      <a href="#" class="switch-auth-mode" onclick="toggleAuth('register')" style="color:var(--gold);">Novo no ecossistema? Manifestar Nódua →</a>
    </div>

    <div id="form-register" class="auth-form">
      <div class="terminal-header" style="color:var(--gold);">// MANIFESTAR_NOVO_OPERADOR (NÍVEL: AVENTURIRO)</div>
      <form onsubmit="handleFormSubmit(event, 'register')">
        <div class="input-group"><input type="text" placeholder="ESCOLHER IDENTIFICADOR" required autocomplete="off"></div>
        <div class="input-group"><input type="email" placeholder="ENDEREÇO DE SINAPSE" required autocomplete="off"></div>
        <div class="input-group"><input type="password" placeholder="GERAR CHAVE CRIPTO-NEURAL" required></div>
        <button type="submit" class="btn-connect" style="background:linear-gradient(135deg, var(--gold), #b48608); color:#000; font-weight:bold;">SOLICITAR ENTRADA</button>
      </form>
      <a href="#" class="switch-auth-mode" onclick="toggleAuth('login')" style="color:var(--rose);">Possui uma chave de operador? Autenticar ←</a>
    </div>

    <a href="#" class="btn-close-terminal" onclick="closeTerminal(event)">// ABORTAR SINAPSE</a>
  </div>
</div>

<div id="readout">VG90 · FRAGMENTO GATEKEEPER · MAPEANDO DISPOSITIVO...</div>

<script>
const isReturningUser = localStorage.getItem('vg90_returning_operator') === 'true';

// Ativa olho alternativo em CSS se a imagem não for encontrada no servidor
function switchToCssEye() {
  const eyeImg = document.getElementById('core-eye');
  if(eyeImg) {
    const fallback = document.createElement('div');
    fallback.className = 'css-eye-fallback';
    fallback.id = 'core-eye';
    eyeImg.replaceWith(fallback);
  }
}

function syncPortalIdentity(returning) {
  const loginForm = document.getElementById('form-login');
  const registerForm = document.getElementById('form-register');
  const card = document.getElementById('login-card');
  const orb = document.getElementById('ambient-orb');
  const instr = document.getElementById('pulse-instruction');
  const eye = document.getElementById('core-eye');
  const readout = document.getElementById('readout');
  const rings = document.querySelectorAll('.dna-ring');

  if (returning) {
    if(loginForm) loginForm.classList.add('visible');
    if(registerForm) registerForm.classList.remove('visible');
    if(card) card.style.borderColor = 'var(--rose)';
    if(orb) orb.style.background = 'rgba(232, 64, 122, 0.05)';
    if(instr) { instr.style.color = 'var(--rose)'; instr.textContent = 'RECONEXÃO REQUERIDA'; }
    if(eye && eye.tagName === 'IMG') eye.style.filter = 'drop-shadow(0 0 25px rgba(232, 64, 122, 0.5))';
    if(readout) { readout.style.color = 'var(--rose)'; readout.textContent = "VG90 · OPERADOR ANTIGO LOCALIZADO · INSIRA A CHAVE NEURAL"; }
    rings.forEach(r => r.style.borderColor = 'rgba(232, 64, 122, 0.25)');
  } else {
    if(registerForm) registerForm.classList.add('visible');
    if(loginForm) loginForm.classList.remove('visible');
    if(card) card.style.borderColor = 'var(--gold)';
    if(orb) orb.style.background = 'rgba(245, 192, 48, 0.05)';
    if(instr) { instr.style.color = 'var(--gold)'; instr.textContent = 'INICIALIZAR NOVO REGISTO'; }
    if(eye && eye.tagName === 'IMG') eye.style.filter = 'drop-shadow(0 0 25px rgba(245, 192, 48, 0.4))';
    if(readout) { readout.style.color = 'var(--gold)'; readout.textContent = "VG90 · SINAL DESCONHECIDO · REQUER MANIFESTAÇÃO DE NÓDULO (RANK: AVENTURIRO)"; }
    rings.forEach(r => r.style.borderColor = 'rgba(245, 192, 48, 0.25)');
  }
}

window.onload = () => {
  syncPortalIdentity(isReturningUser);
  buildNetworkLines();
};

function toggleAuth(mode) { syncPortalIdentity(mode === 'login'); }

function openTerminal() {
  document.getElementById('login-card').classList.add('active');
  const instr = document.getElementById('pulse-instruction');
  if(instr) instr.style.opacity = '0';
  document.getElementById('eye-container').style.transform = 'scale(0.78) translateY(-85px)';
}

function closeTerminal(e) {
  e.stopPropagation();
  document.getElementById('login-card').classList.remove('active');
  const instr = document.getElementById('pulse-instruction');
  if(instr) instr.style.opacity = '1';
  document.getElementById('eye-container').style.transform = 'scale(1) translateY(0)';
}

// INTERCEPTADOR DE SUBMISSÃO SEGURO (Evita quebras de erro 404/500 no clique)
function handleFormSubmit(event, type) {
  event.preventDefault(); // Congela o comportamento de recarga cega da página

  localStorage.setItem('vg90_returning_operator', 'true');
  const readout = document.getElementById('readout');
  
  if(type === 'register') {
    if (readout) readout.textContent = "NÓDULO MANIFESTADO COM SUCESSO · ATUALIZANDO SINAL...";
    setTimeout(() => {
      syncPortalIdentity(true); // Redireciona visualmente para o ecrã de Login
    }, 1200);
  } else {
    if (readout) readout.textContent = "CONECTANDO À MATRIX... AGUARDE SINCRO...";
    // Aqui podes adicionar o redirecionamento real para a VG Dev Zone, ex: window.location.href = "/dashboard";
  }
}

function buildNetworkLines() {
  const svg = document.getElementById('network-svg');
  if(!svg) return;
  svg.innerHTML = '';
  const W = window.innerWidth, H = window.innerHeight;
  for(let i=0; i<6; i++) {
    const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    const angle = (i * Math.PI) / 3;
    const targetX = W/2 + Math.cos(angle) * (W * 0.4);
    const targetY = H/2 + Math.sin(angle) * (H * 0.4);
    const d = `M ${W/2} ${H/2} Q ${W/2 + (targetX - W/2)*0.5 + (Math.random()-0.5)*100} ${H/2 + (targetY - H/2)*0.5 + (Math.random()-0.5)*100} ${targetX} ${targetY}`;
    path.setAttribute('d', d); path.setAttribute('fill', 'none');
    path.setAttribute('stroke', isReturningUser ? 'rgba(232,64,122,0.06)' : 'rgba(245,192,48,0.06)');
    path.setAttribute('stroke-width', '1.5'); svg.appendChild(path);
  }
}
window.addEventListener('resize', buildNetworkLines);

(function(){
  const cv = document.getElementById('breath-canvas'); if(!cv) return;
  const cx = cv.getContext('2d'); let W, H, cells=[], t=0;
  function resize(){ W=cv.width=window.innerWidth; H=cv.height=window.innerHeight; buildCells(); }
  function buildCells(){
    cells=[]; const count = Math.floor((W*H)/20000);
    for(let i=0; i<count; i++){
      cells.push({ x:Math.random()*W, y:Math.random()*H, vx:(Math.random()-.5)*.18, vy:(Math.random()-.5)*.18, r:Math.random()*1.3+0.4, phase:Math.random()*Math.PI*2 });
    }
  }
  resize(); window.addEventListener('resize',resize);
  function draw(){
    t += 0.004; cx.clearRect(0,0,W,H);
    cells.forEach(p=>{
      p.x += p.vx; p.y += p.vy; if(p.x<0)p.x=W; if(p.x>W)p.x=0; if(p.y<0)p.y=H; if(p.y>H)p.y=0;
      cx.beginPath(); cx.arc(p.x,p.y,p.r,0,Math.PI*2);
      cx.fillStyle = isReturningUser ? 'rgba(232,64,122,'+(0.06 + 0.06*Math.sin(t+p.phase))+')' : 'rgba(245,192,48,'+(0.06 + 0.06*Math.sin(t+p.phase))+')';
      cx.fill();
    });
    requestAnimationFrame(draw);
  }
  draw();
})();
</script>
</body>
</html>
