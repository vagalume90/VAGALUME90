<script type="module">
  // ============================================================
  // CONFIGURAÇÃO DO FIREBASE (USANDO SEUS DADOS)
  // ============================================================
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
  import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";
  import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";

  // Your web app's Firebase configuration
  const firebaseConfig = {
    apiKey: "AIzaSyA0Z7uaMVo2HsgKpKFbsEQve26xSxjmJr8",
    authDomain: "vagalume90-79c87.firebaseapp.com",
    projectId: "vagalume90-79c87",
    storageBucket: "vagalume90-79c87.firebasestorage.app",
    messagingSenderId: "933159656212",
    appId: "1:933159656212:web:0cd1bb6ad11c3838490001",
    measurementId: "G-28G5ZYE9L0"
  };

  // Initialize Firebase
  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const auth = getAuth(app);

  console.log("🔥 Firebase conectado com sucesso!");

  // ============================================================
  // FUNÇÃO PARA SALVAR LEAD DO POPUP
  // ============================================================
  window.salvarLeadFirebase = async function(nome, whatsapp) {
    try {
      const docRef = await addDoc(collection(db, "leads"), {
        nome: nome || "Anônimo",
        whatsapp: whatsapp,
        dataCadastro: serverTimestamp(),
        origem: "popup_site",
        status: "novo"
      });
      console.log("✅ Lead salvo! ID:", docRef.id);
      return true;
    } catch (error) {
      console.error("❌ Erro ao salvar lead:", error);
      return false;
    }
  };

  // ============================================================
  // FUNÇÃO PARA SALVAR CADASTRO DE AFILIADO
  // ============================================================
  window.salvarAfiliadoFirebase = async function(dados) {
    try {
      // Gerar código único
      const codigo = 'VAG-' + Math.random().toString(36).substring(2, 8).toUpperCase();
      
      const docRef = await addDoc(collection(db, "afiliados"), {
        nome: dados.nome,
        apelido: dados.apelido,
        email: dados.email,
        whatsapp: dados.whatsapp,
        plataforma: dados.plataforma,
        seguidores: dados.seguidores,
        linkPerfil: dados.linkPerfil,
        comoDivulgar: dados.comoDivulgar,
        codigoAfiliado: codigo,
        dataCadastro: serverTimestamp(),
        status: "pendente",
        convites: 0,
        totalVendas: 0
      });
      
      console.log("✅ Afiliado salvo! ID:", docRef.id, "Código:", codigo);
      return { success: true, codigo: codigo, id: docRef.id };
    } catch (error) {
      console.error("❌ Erro ao salvar afiliado:", error);
      return { success: false, error: error.message };
    }
  };

  // ============================================================
  // FUNÇÃO PARA SALVAR CONSULTA DE CASAIS
  // ============================================================
  window.salvarConsultaCasaisFirebase = async function(dados) {
    try {
      const docRef = await addDoc(collection(db, "consultas_casais"), {
        nome: dados.nome,
        idade: dados.idade,
        whatsapp: dados.whatsapp,
        tema: dados.tema,
        estadoRelacionamento: dados.estadoRelacionamento,
        situacao: dados.situacao,
        tipo: dados.tipo || "premium",
        dataSolicitacao: serverTimestamp(),
        status: "pendente"
      });
      console.log("✅ Consulta salva! ID:", docRef.id);
      return { success: true, id: docRef.id };
    } catch (error) {
      console.error("❌ Erro ao salvar consulta:", error);
      return { success: false, error: error.message };
    }
  };

  // ============================================================
  // FUNÇÃO PARA SALVAR COMPRA DE CURSO/LIVRO
  // ============================================================
  window.salvarCompraFirebase = async function(dados) {
    try {
      const docRef = await addDoc(collection(db, "vendas"), {
        produto: dados.produto,
        tipo: dados.tipo, // "curso" ou "livro"
        preco: dados.preco,
        nomeCliente: dados.nomeCliente,
        whatsapp: dados.whatsapp,
        dataVenda: serverTimestamp(),
        status: "pendente"
      });
      console.log("✅ Venda salva! ID:", docRef.id);
      return { success: true, id: docRef.id };
    } catch (error) {
      console.error("❌ Erro ao salvar venda:", error);
      return { success: false, error: error.message };
    }
  };

  // ============================================================
  // FUNÇÃO PARA CRIAR CONTA DE AUTENTICAÇÃO
  // ============================================================
  window.criarContaAuthFirebase = async function(email, senha, nome) {
    try {
      const userCredential = await createUserWithEmailAndPassword(auth, email, senha);
      console.log("✅ Conta criada! UID:", userCredential.user.uid);
      return { success: true, uid: userCredential.user.uid };
    } catch (error) {
      console.error("❌ Erro na autenticação:", error);
      return { success: false, error: error.message };
    }
  };

  // ============================================================
  // SUBSTITUIR A FUNÇÃO DO POPUP PARA USAR FIREBASE
  // ============================================================
  // Salvar a função original se existir
  if (typeof window.submeterPopupOriginal === 'undefined') {
    window.submeterPopupOriginal = window.submeterPopup;
  }

  window.submeterPopup = async function() {
    const nome = document.getElementById('popupNome').value.trim();
    const wa = document.getElementById('popupWa').value.trim();
    
    if (!wa) {
      document.getElementById('popupWa').style.borderColor = 'rgba(255,107,26,0.6)';
      document.getElementById('popupWa').focus();
      return;
    }

    // SALVAR NO FIREBASE
    const salvou = await window.salvarLeadFirebase(nome, wa);
    
    if (salvou) {
      console.log("🎉 Lead salvo com sucesso no Firebase!");
    }

    const msg = encodeURIComponent(
      `Olá Vagalume90! 🥹 Quero entrar na família!\n\n` +
      `👤 Nome: ${nome || 'Não informado'}\n📱 WhatsApp: ${wa}`
    );
    
    document.getElementById('popupWaLink').href = `https://wa.me/244929894589?text=${msg}`;
    document.getElementById('popupForm').style.display = 'none';
    const s = document.getElementById('popupSucesso');
    s.style.display = 'flex';
  };

  // ============================================================
  // SUBSTITUIR A FUNÇÃO DE REGISTO DE AFILIADO
  // ============================================================
  if (typeof window.submeterRegistoOriginal === 'undefined') {
    window.submeterRegistoOriginal = window.submeterRegisto;
  }

  window.submeterRegisto = async function(e) {
    e.preventDefault();
    
    const form = e.target;
    const nome = form.querySelector('input[placeholder="Teu nome"]').value;
    const apelido = form.querySelector('input[placeholder="Teu apelido"]').value;
    const email = form.querySelector('input[type="email"]').value;
    const whatsapp = form.querySelector('input[type="tel"]').value;
    const plataforma = form.querySelector('select:first-of-type').value;
    const seguidores = form.querySelectorAll('select')[1].value;
    const linkPerfil = form.querySelector('input[type="url"]').value;
    const comoDivulgar = form.querySelector('textarea').value;
    const senha = form.querySelector('input[type="password"]').value;

    // SALVAR NO FIREBASE
    const resultado = await window.salvarAfiliadoFirebase({
      nome, apelido, email, whatsapp, plataforma, seguidores, linkPerfil, comoDivulgar
    });

    if (!resultado.success) {
      alert("Erro ao cadastrar. Tente novamente.");
      return;
    }

    // Criar conta de autenticação (opcional)
    if (senha && senha.length >= 6) {
      await window.criarContaAuthFirebase(email, senha, `${nome} ${apelido}`);
    }

    const codigo = resultado.codigo;
    const link = `https://vagalume90.com/afiliado?ref=${codigo}`;

    document.getElementById('codigoRef').textContent = codigo;
    document.getElementById('linkConvite').textContent = link;
    document.getElementById('btnWhatsapp').href =
      `https://wa.me/244929894589?text=Olá!%20Acabei%20de%20me%20registar%20como%20afiliado%20Vagalume90.%20Meu%20código%20é%20${codigo}%20e%20meu%20email%20é%20${email}`;

    document.getElementById('formArea').style.display = 'none';
    const s = document.getElementById('sucessoArea');
    s.style.display = 'flex';
  };

  // ============================================================
  // SUBSTITUIR A FUNÇÃO DE CONSULTA DE CASAIS
  // ============================================================
  if (typeof window.submeterCasaisOriginal === 'undefined') {
    window.submeterCasaisOriginal = window.submeterCasais;
  }

  window.submeterCasais = async function(e) {
    e.preventDefault();
    
    const nome = document.getElementById('nomesCasais').value;
    const idade = document.querySelector('#modalCasais input[type="number"]')?.value || '';
    const wa = document.getElementById('waCasais').value;
    const tema = document.getElementById('temaCasais').value;
    const estadoRelacionamento = document.querySelectorAll('#modalCasais select')[1]?.value || '';
    const situacao = document.getElementById('situacaoCasais').value;

    // SALVAR NO FIREBASE
    const resultado = await window.salvarConsultaCasaisFirebase({
      nome,
      idade,
      whatsapp: wa,
      tema,
      estadoRelacionamento,
      situacao,
      tipo: "premium"
    });

    if (!resultado.success) {
      alert("Erro ao enviar. Tente novamente.");
      return;
    }

    const msg = encodeURIComponent(
      `Olá! Quero Sessão Premium (2.000 Kz) na área de Assessoria para Casais.\n\n` +
      `👤 Nome: ${nome}\n📱 WhatsApp: ${wa}\n💑 Tema: ${tema}\n\n` +
      `📝 Situação:\n${situacao}`
    );

    document.getElementById('btnWhatsappCasais').href = `https://wa.me/244929894589?text=${msg}`;
    document.getElementById('formAreaCasais').style.display = 'none';
    const s = document.getElementById('sucessoCasais');
    s.style.display = 'flex';
  };

  // ============================================================
  // FUNÇÃO PARA SALVAR COMPRA DE CURSO/LIVRO (BOTÕES DE COMPRA)
  // ============================================================
  window.comprarProduto = async function(produto, tipo, preco) {
    const nome = prompt("Digite seu nome:");
    if (!nome) return;
    
    const whatsapp = prompt("Digite seu WhatsApp (ex: 2449XX XXX XXX):");
    if (!whatsapp) return;

    // SALVAR NO FIREBASE
    const resultado = await window.salvarCompraFirebase({
      produto: produto,
      tipo: tipo,
      preco: preco,
      nomeCliente: nome,
      whatsapp: whatsapp
    });

    if (resultado.success) {
      alert(`✅ Pedido registrado! Em breve entraremos em contato via WhatsApp para finalizar a compra de: ${produto}`);
      // Abrir WhatsApp
      const msg = encodeURIComponent(
        `Olá! Quero comprar ${produto} (${preco} Kz).\n\n` +
        `👤 Nome: ${nome}\n📱 WhatsApp: ${whatsapp}`
      );
      window.open(`https://wa.me/244929894589?text=${msg}`, '_blank');
    } else {
      alert("Erro ao registrar pedido. Tente novamente.");
    }
  };

  console.log("✅ Firebase totalmente configurado! Todos os dados serão salvos automaticamente.");
  console.log("📊 Coleções criadas: leads, afiliados, consultas_casais, vendas");
</script>
