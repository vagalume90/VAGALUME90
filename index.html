<!DOCTYPE html>
<html lang="pt-AO">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VG90 · Portal de Entrada Quântico</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Space+Grotesk:wght@300;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --neon-void: #020204; --plasma-rose: #ff0055; --singularity-gold: #ffcc00; --tachyon-blue: #00f0ff;
  --f-orbitron: 'Orbitron', sans-serif; --f-grotesk: 'Space Grotesk', sans-serif;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 100%; height: 100vh; background: var(--neon-void);
  font-family: var(--f-grotesk); color: #fff; overflow: hidden;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  background-image: radial-gradient(circle at 50% 50%, rgba(0, 240, 255, 0.03) 0%, transparent 80%);
}

/* Orbe de Energia Estelar no Fundo */
#ambient-energy {
  position: fixed; width: 500px; height: 500px; border-radius: 50%;
  filter: blur(120px); pointer-events: none; opacity: 0.12; transition: background 0.6s ease;
}

/* Portal do Olho Consciente */
#eye-portal {
  width: 160px; height: 160px; margin-bottom: 25px;
  cursor: pointer; position: relative; z-index: 10;
  transition: transform 0.4s cubic-bezier(0.19, 1, 0.22, 1);
}
#eye-portal:hover { transform: scale(1.08) rotate(5deg); }

.portal-img {
  width: 100%; height: 100%; object-fit: contain; border-radius: 50%;
  display: block; animation: floatEnergy 4s ease-in-out infinite;
}
@keyframes floatEnergy {
  0%, 100% { transform: translateY(0); filter: drop-shadow(0 0 15px rgba(0, 240, 255, 0.2)); }
  50% { transform: translateY(-6px); filter: drop-shadow(0 0 25px rgba(255, 0, 85, 0.4)); }
}

/* Fallback Quântico em CSS se a imagem falhar */
.portal-fallback {
  width: 100%; height: 100%; border-radius: 50%;
  border: 2px solid var(--tachyon-blue); background: rgba(0, 240, 255, 0.05);
  box-shadow: 0 0 30px rgba(0, 240, 255, 0.2); display: flex; align-items: center; justify-content: center;
}
.portal-fallback::after { content: '👁️'; font-size: 3.2rem; filter: drop-shadow(0 0 10px var(--tachyon-blue)); }

/* Cartão Uniforme Intersetorial */
#hyper-auth-card {
  background: rgba(2, 2, 4, 0.92); border: 1px solid transparent;
  padding: 40px 35px; border-radius: 16px; width: 100%; max-width: 380px;
  box-shadow: 0 20px 50px rgba(0,0,0,0.8); z-index: 10; backdrop-filter: blur(20px);
  transition: border-color 0.6s cubic-bezier(0.19, 1, 0.22, 1);
}

.hyper-title { font-family: var(--f-orbitron); font-size: 1.1rem; font-weight: 700; margin-bottom: 25px; text-align: center; letter-spacing: 2px; }
.quantum-form { display: none; }
.quantum-form.active { display: block; }

/* Injeções de Dados (Inputs) */
.hyper-input {
  width: 100%; background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(255, 255, 255, 0.08);
  padding: 14px 18px; font-size: 0.9rem; color: #fff; border-radius: 8px;
  outline: none; margin-bottom: 18px; transition: all 0.3s; font-family: var(--f-grotesk);
}
.hyper-input:focus { background: rgba(255, 255, 255, 0.04); border-color: var(--tachyon-blue); box-shadow: 0 0 15px rgba(0, 240, 255, 0.1); }

/* Gatilhos de Ignição (Botões) */
.btn-ignition {
  width: 100%; border: none; padding: 15px; border-radius: 8px;
  font-family: var(--f-orbitron); font-size: 0.9rem; font-weight: 700; letter-spacing: 2px;
  color: #000; cursor: pointer; transition: all 0.3s; margin-top: 5px;
}
.btn-ignition:hover { transform: translateY(-2px); filter: brightness(1.2); }

/* Links de Alternância Temporal */
.switch-timeline { display: block; text-align: center; margin-top: 20px; font-size: 0.8rem; color: #555; text-decoration: none; font-family: var(--f-orbitron); letter-spacing: 1px; transition: color 0.3s; }
.switch-timeline strong { color: #aaa; transition: color 0.3s; }
.switch-timeline:hover strong { color: #fff; text-shadow: 0 0 8px #fff; }

/* Monitor de Status */
#telemetry-readout { margin-top: 25px; font-family: var(--f-orbitron); font-size: 0.65rem; color: #444; text-align: center; letter-spacing: 2px; max-width: 340px; text-transform: uppercase; }
</style>
</head>
<body>

<div id="ambient-energy"></div>

<div id="eye-portal">
  <img src="logo_olho.jpg.png" alt="Portal Consciente VG90" class="portal-img" id="site-logo" onerror="activateFallback()">
</div>

<div id="hyper-auth-card">
  <div id="form-login" class="quantum-form">
    <div class="hyper-title" style="color: var(--plasma-rose); text-shadow: 0 0 15px rgba(255, 0, 85, 0.3);">// RECONECTAR_ASSINATURA</div>
    <form onsubmit="initiateIgnition(event, '/login')">
      <input type="text" name="username" class="hyper-input" placeholder="IDENTIFICADOR OPERADOR" required autocomplete="username">
      <input type="password" name="password" class="hyper-input" placeholder="CHAVE NEURAL" required autocomplete="current-password">
      <button type="submit" class="btn-ignition" style="background: var(--plasma-rose); color: #fff; box-shadow: 0 4px 15px rgba(255, 0, 85, 0.2);">ENTRAR NA MATRIX</button>
    </form>
    <a href="#" class="switch-timeline" onclick="shiftTimeline('register')">Nova Entidade? <strong>Manifestar Nódua →</strong></a>
  </div>

  <div id="form-register" class="quantum-form">
    <div class="hyper-title" style="color: var(--singularity-gold); text-shadow: 0 0 15px rgba(255, 204, 0, 0.3);">// MATERIALIZAR_NÓDULO</div>
    <form onsubmit="initiateIgnition(event, '/register')">
      <input type="text" name="username" class="hyper-input" placeholder="ESCOLHER IDENTIFICADOR" required autocomplete="username">
      <input type="email" name="email" class="hyper-input" placeholder="ENDEREÇO DE SINAPSE (E-MAIL)" required autocomplete="email">
      <input type="password" name="password" class="hyper-input" placeholder="CRIPTOGRAFAR CHAVE NEURAL" required autocomplete="new-password">
      <button type="submit" class="btn-ignition" style="background: var(--singularity-gold); box-shadow: 0 4px 15px rgba(255, 204, 0, 0.2);">SOLICITAR INGRESSO</button>
    </form>
    <a href="#" class="switch-timeline" onclick="shiftTimeline('login')">Possui uma chave? <strong>Autenticar Operador ←</strong></a>
  </div>
</div>

<div id="telemetry-readout">Aguardando telemetria de entrada...</div>

<script>
// Ativa o olho geométrico em CSS puro caso a imagem seja bloqueada pelo Render/Git
function activateFallback() {
  const img = document.getElementById('site-logo');
  if (img && !img.dataset.retry) {
    img.dataset.retry = "true";
    img.src = "/static/logo_olho.jpg.png";
  } else {
    const portal = document.getElementById('eye-portal');
    portal.innerHTML = '<div class="portal-fallback"></div>';
  }
}

let activeTimeline = localStorage.getItem('vg90_returning') === 'true' ? 'login' : 'register';

function shiftTimeline(mode) {
  activeTimeline = mode;
  localStorage.setItem('vg90_returning', mode === 'login' ? 'true' : 'false');
  
  const loginForm = document.getElementById('form-login');
  const registerForm = document.getElementById('form-register');
  const card = document.getElementById('hyper-auth-card');
  const energy = document.getElementById('ambient-energy');
  
  if (mode === 'login') {
    loginForm.classList.add('active');
    registerForm.classList.remove('active');
    card.style.borderColor = 'rgba(255, 0, 85, 0.3)';
    energy.style.background = 'var(--plasma-rose)';
  } else {
    registerForm.classList.add('active');
    loginForm.classList.remove('active');
    card.style.borderColor = 'rgba(255, 204, 0, 0.3)';
    energy.style.background = 'var(--singularity-gold)';
  }
}

// Inicializa no modo correto guardado na memória quântica do navegador
shiftTimeline(activeTimeline);

// Envio simplificado e instantâneo de dados para o Backend Python
function initiateIgnition(event, targetUrl) {
  event.preventDefault();
  const telemetry = document.getElementById('telemetry-readout');
  telemetry.textContent = "> Transmitindo pacotes de dados na velocidade da luz...";
  telemetry.style.color = "#666";

  const formData = new FormData(event.target);

  fetch(targetUrl, { method: 'POST', body: formData })
  .then(res => res.json())
  .then(data => {
    if (data.success) {
      if (targetUrl === '/register') {
        telemetry.textContent = "> Nódua materializada no MongoDB Atlas! Redirecionando para login...";
        telemetry.style.color = "var(--singularity-gold)";
        setTimeout(() => shiftTimeline('login'), 1500);
      } else {
        telemetry.textContent = `> Acesso concedido! Saltando para o núcleo da Matrix...`;
        telemetry.style.color = "var(--tachyon-blue)";
        setTimeout(() => window.location.href = "/mundo/matrix", 1200);
      }
    } else {
      telemetry.textContent = `> Erro na fenda: ${data.message}`;
      telemetry.style.color = "var(--plasma-rose)";
    }
  })
  .catch(() => {
    telemetry.textContent = "> Erro crítico: Colapso na comunicação com o servidor central.";
    telemetry.style.color = "var(--plasma-rose)";
  });
}
</script>
</body>
</html>
